name: preference-rm

envs:
  WANDB_API_KEY: ${WANDB_API_KEY}
  WANDB_PROJECT: rlhf-book

resources:
  cloud: runpod
  accelerators: A10G:1
  disk_size: 50

setup: |
  # Install uv
  curl -LsSf https://astral.sh/uv/install.sh | sh
  source $HOME/.local/bin/env

  # Clone and install
  git clone https://github.com/adsingh-64/rlhf-book.git
  cd rlhf-book/code
  uv sync

run: |
  source $HOME/.local/bin/env
  cd rlhf-book/code
  uv run python -m reward_models.train_preference_rm \
    --samples 2000 \
    --epochs 1 \
    --batch-size 2 \
    --grad-accum 4
