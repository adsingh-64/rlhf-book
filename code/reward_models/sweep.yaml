program: reward_models/run_sweep.py
command:
  - uv
  - run
  - python
  - ${program}
method: bayes
metric:
  name: epoch_loss
  goal: minimize

parameters:
  lr:
    min: 5e-5
    max: 1e-4
    distribution: log_uniform_values
  effective_batch_size:
    values: [16, 32]
  samples:
    value: 5000
  epochs:
    value: 1
