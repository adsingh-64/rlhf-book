program: reward_models/run_sweep.py
command:
  - uv
  - run
  - python
  - ${program}
method: bayes
metric:
  name: accuracy
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 50

parameters:
  lr:
    min: 5e-7
    max: 5e-5
    distribution: log_uniform_values
  effective_batch_size:
    values: [4, 8, 16, 32]
  samples:
    value: 5000
  epochs:
    value: 1
